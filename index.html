<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAFAFA" />

    <!-- Primary Meta -->
    <title>Umang Jaiswal — AI Engineer, Data Scientist & Builder</title>
    <meta
      name="description"
      content="Umang Jaiswal turns messy data into intelligent products. AI/ML engineer and full-stack builder shipping clinical AI, fintech models, and civic platforms."
    />
    <meta name="author" content="Umang Jaiswal" />
    <meta name="keywords" content="Umang Jaiswal, AI Engineer, Machine Learning, Data Scientist, Full Stack Developer, Portfolio" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://umangjaiswal.dev/" />
    <meta property="og:title" content="Umang Jaiswal — AI Engineer, Data Scientist & Builder" />
    <meta property="og:description" content="I turn messy data into intelligent products. Explore the work, the research, and the builds." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Umang Jaiswal — AI Engineer, Data Scientist & Builder" />
    <meta name="twitter:description" content="I turn messy data into intelligent products." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://umangjaiswal.dev/" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Umang Jaiswal",
      "url": "https://umangjaiswal.dev",
      "image": "https://umangjaiswal.dev/profile.jpg",
      "jobTitle": "AI & ML Engineer",
      "worksFor": {
        "@type": "Organization",
        "name": "profitstory.ai"
      },
      "alumniOf": {
        "@type": "EducationalOrganization",
        "name": "Coimbatore Institute of Technology"
      },
      "knowsAbout": ["Machine Learning", "Artificial Intelligence", "Data Science", "Python", "React", "Full Stack Development"],
      "sameAs": [
        "https://github.com/umangjzx",
        "https://www.linkedin.com/in/umang-jaiswal-n"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Coimbatore",
        "addressCountry": "IN"
      }
    }
    </script>

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Preload critical above-the-fold image -->
    <link rel="preload" as="image" href="/profile.jpg" type="image/jpeg" />

    <!-- Fonts: Clash Display (display) + Satoshi (body) via Fontshare, Inter fallback via Google -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700,900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700,900&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Ensure system fonts display immediately while custom fonts load -->
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
    </style>
  </body>
</html>
